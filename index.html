<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Meta Tags -->
    <title>Appscrip - Fashion & Clothing Store | Premium Quality Products</title>
    <meta name="title" content="Appscrip - Fashion & Clothing Store | Premium Quality Products" />
    <meta name="description" content="Shop premium fashion and clothing at Appscrip. Discover our exclusive collection of high-quality apparel, accessories, and more. Free shipping on orders over $50." />
    <meta name="keywords" content="fashion, clothing, apparel, online shopping, premium quality, designer wear, fashion store" />
    <meta name="author" content="Appscrip" />
    
    <!-- Mobile App Meta Tags -->
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Appscrip" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://appscrip.com/" />
    
    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://appscrip.com/" />
    <meta property="og:title" content="Appscrip - Fashion & Clothing Store | Premium Quality Products" />
    <meta property="og:description" content="Shop premium fashion and clothing at Appscrip. Discover our exclusive collection of high-quality apparel, accessories, and more." />
    <meta property="og:image" content="https://appscrip.com/og-image.jpg" />
    <meta property="og:site_name" content="Appscrip" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter / X Meta Tags -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://appscrip.com/" />
    <meta property="twitter:title" content="Appscrip - Fashion & Clothing Store | Premium Quality Products" />
    <meta property="twitter:description" content="Shop premium fashion and clothing at Appscrip. Discover our exclusive collection of high-quality apparel, accessories, and more." />
    <meta property="twitter:image" content="https://appscrip.com/og-image.jpg" />
    <meta property="twitter:creator" content="@appscrip" />
    
    <!-- Additional Meta Tags -->
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <link rel="alternate" hreflang="en" href="https://appscrip.com/" />
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- JSON-LD Structured Data for Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Appscrip",
      "url": "https://appscrip.com",
      "logo": "https://appscrip.com/logo.png",
      "description": "Premium fashion and clothing store offering high-quality apparel and accessories",
      "sameAs": [
        "https://www.facebook.com/appscrip",
        "https://www.twitter.com/appscrip",
        "https://www.instagram.com/appscrip",
        "https://www.linkedin.com/company/appscrip"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-XXX-XXX-XXXX",
        "contactType": "Customer Service"
      }
    }
    </script>
    
    <!-- JSON-LD Structured Data for Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Appscrip",
      "url": "https://appscrip.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://appscrip.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
