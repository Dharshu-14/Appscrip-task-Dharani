# Netlify configuration file
# See docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Build command to generate production build
  command = "npm run build"
  
  # Directory to deploy (where build output goes)
  publish = "dist"
  
  # Node version
  environment = { NODE_VERSION = "18.17.0" }

# Redirects for SPA routing
[[redirects]]
  # Redirect all non-file requests to index.html for client-side routing
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  conditions = { Language = ["en"] }

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "SAMEORIGIN"
    # Enable MIME type sniffing prevention
    X-Content-Type-Options = "nosniff"
    # Enable XSS protection in older browsers
    X-XSS-Protection = "1; mode=block"
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions policy
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers for HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache headers for JS and CSS
[[headers]]
  for = "/*.{js,css}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers for fonts
[[headers]]
  for = "/*.{woff,woff2,ttf,otf,eot}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers for images
[[headers]]
  for = "/*.{jpg,jpeg,png,gif,svg,webp,ico}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Context specific settings (production)
[context.production]
  command = "npm run build"
  publish = "dist"

# Context specific settings (preview/staging)
[context.deploy-preview]
  command = "npm run build"
  publish = "dist"

# Context specific settings (branch preview)
[context.branch-deploy]
  command = "npm run build"
  publish = "dist"
